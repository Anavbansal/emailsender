services:
  - type: web
    name: job-mailer-backend
    env: node
    region: singapore   # closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GMAIL_USER
        sync: false        # set manually in Render dashboard
      - key: GMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: BASE_URL
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: SHEET_TAB
        value: Contacts
